<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Body & Brain by Myriam</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root{
      --bg: #FBF7F2;
      --ink: #0F172A;
      --muted: #4B5563;
      --border: rgba(15, 23, 42, 0.08);
      --shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
      --babyBlue: #DCEBFF;
      --babyPink: #F7D7E6;
      --babyPeach: #FFE6D3;
    }
    body{ background: var(--bg); color: var(--ink); }
    .ratio { position: relative; width: 100%; padding-top: 56.25%; }
    .ratio > iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  </style>
</head>

<body>

<!-- HERO SECTION -->
<section class="mx-auto max-w-6xl px-4 pt-16 pb-16">
  <div class="grid md:grid-cols-2 gap-12 items-center">

    <!-- LEFT TEXT -->
    <div>
      <h1 id="brandNameTop" class="text-5xl font-semibold leading-tight">
        Body & Brain by Myriam
      </h1>

      <p id="heroHeadline" class="mt-6 text-xl font-medium">
        Simple, effective vinyasa — grounded in neuroscience.
      </p>

      <p id="heroSub" class="mt-4 text-base text-gray-600 max-w-lg">
        Practice at home with free YouTube flows, follow on Instagram,
        and book paid live Zoom classes.
      </p>
    </div>

    <!-- RIGHT PROFILE IMAGE (LARGE) -->
    <div class="rounded-3xl overflow-hidden border bg-white"
         style="border-color: var(--border); box-shadow: var(--shadow);">

      <img id="brandPhoto"
           class="w-full h-auto object-cover"
           alt="Profile photo"
           loading="lazy" />

    </div>

  </div>
</section>

<script>
async function loadContent(){
  const res = await fetch('./content.json', { cache: 'no-store' });
  return await res.json();
}

(async () => {
  const content = await loadContent();
  const brand = content.brand || {};
  const copy = content.copy || {};

  // Text
  document.getElementById('brandNameTop').textContent = brand.name;
  document.getElementById('heroHeadline').textContent = copy.heroHeadline;
  document.getElementById('heroSub').textContent = copy.heroSub;

  // Large profile image
  const photoEl = document.getElementById('brandPhoto');
  if (brand.photo) {
    photoEl.src = brand.photo;
  }
})();
</script>

</body>
</html>
